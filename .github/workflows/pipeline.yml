name: BEDAP CI/CD Pipeline (Argo Simulation)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Add permissions needed for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  data-pipeline-and-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ADDED DUCKDB TO PIP INSTALL
      - name: Install dbt and DuckDB adapter
        run: pip install dbt-duckdb dbt-core duckdb

      - name: Node A - Ingest/Seed Data
        run: dbt seed --profiles-dir .
        working-directory: ./bedap-dbt

      # FIX 1: RUN ENTIRE DAG FIRST
      - name: Node B - Run Entire DAG
        run: dbt run --profiles-dir .
        working-directory: ./bedap-dbt

      # FIX 1.5: TEST ENTIRE DAG ONCE EVERYTHING EXISTS
      - name: Node C - Test Entire DAG (Circuit Breaker)
        run: dbt test --profiles-dir .
        working-directory: ./bedap-dbt

      - name: Node D - Generate dbt Docs & Move to UI
        run: |
          dbt docs generate --profiles-dir .
          # Create a docs folder in the Vite public directory
          mkdir -p ../bedap-ui/public/docs
          # Copy the generated dbt docs to the public folder
          cp target/index.html ../bedap-ui/public/docs/
          cp target/manifest.json ../bedap-ui/public/docs/
          cp target/catalog.json ../bedap-ui/public/docs/
        working-directory: ./bedap-dbt

      # FIX 2: EXPORT VIA PYTHON, NOT BASH CLI
      - name: Node E - Export BFF JSON API via Python
        run: |
          # Ensure target directories exist
          mkdir -p bedap-ui/public/data

          # Export flat JSON arrays using Python
          python -c "
          import duckdb
          con = duckdb.connect('bedap-dbt/bedap_mock.duckdb')
          con.execute(\"COPY (SELECT * FROM medicare__beneficiary_profile) TO 'bedap-ui/public/data/beneficiaries.json' (FORMAT JSON, ARRAY TRUE)\")
          con.execute(\"COPY (SELECT * FROM medicare__claim_detail) TO 'bedap-ui/public/data/claims.json' (FORMAT JSON, ARRAY TRUE)\")
          con.execute(\"COPY (SELECT * FROM medicare__engagement_log) TO 'bedap-ui/public/data/events.json' (FORMAT JSON, ARRAY TRUE)\")
          con.close()
          "

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: ./bedap-ui

      - name: Build React App (Vite)
        run: npm run build -- --base=/${{ github.event.repository.name }}/
        working-directory: ./bedap-ui

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./bedap-ui/dist

  deploy-to-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: data-pipeline-and-build
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
